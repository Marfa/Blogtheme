name: Theme timestamp

on:
  push:
    branches: [master]
    paths-ignore:
      - partials/theme-updated.hbs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update theme timestamp
        run: node scripts/update-theme-updated.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add partials/theme-updated.hbs
          git diff --cached --quiet && exit 0
          git commit -m "chore: update theme timestamp"
          git push
