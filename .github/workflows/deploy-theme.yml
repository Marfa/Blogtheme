name: Deploy Theme

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - partials/theme-updated.hbs
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-theme
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update theme timestamp
        run: node scripts/update-theme-updated.js

      - name: Commit timestamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add partials/theme-updated.hbs
          git diff --cached --quiet || git commit -m "chore: update theme timestamp"

      - name: Validate, build, and zip theme
        run: npm run zip

      - name: Deploy to Ghost
        uses: TryGhost/action-deploy-theme@v2
        with:
          api-url: ${{ secrets.GHOST_ADMIN_API_URL }}
          api-key: ${{ secrets.GHOST_ADMIN_API_KEY }}
          version: v6.0
          file: dist/joben.zip

      - name: Push timestamp commit
        run: |
          ahead=$(git rev-list --count origin/master..HEAD)
          if [ "$ahead" -gt 0 ]; then
            git push
          fi
